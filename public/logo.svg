<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400" role="img" aria-labelledby="title desc">
  <title id="title">GetYourTours Mauritius logo - coral blue</title>
  <desc id="desc">Horizontal transparent SVG logo with a location pin icon followed by GetYourTours Mauritius in coral blue.</desc>
  <defs>
    <linearGradient id="coralBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25D4E8"/>
      <stop offset="0.55" stop-color="#00A9C8"/>
      <stop offset="1" stop-color="#007EA6"/>
    </linearGradient>
    <mask id="pinCutout" maskUnits="userSpaceOnUse">
      <rect width="1600" height="400" fill="white"/>
      <circle cx="160" cy="160" r="42" fill="black"/>
    </mask>
  </defs>

  <!-- Transparent background by design: no background rect. -->
  <g id="logo" fill="url(#coralBlue)">
    <path id="pin" mask="url(#pinCutout)" d="M160 34C86.55 34 27 93.55 27 167c0 102.7 133 199 133 199s133-96.3 133-199C293 93.55 233.45 34 160 34Zm0 216c-49.71 0-90-40.29-90-90s40.29-90 90-90 90 40.29 90 90-40.29 90-90 90Z"/>

    <text x="335" y="238" font-family="Inter, Montserrat, Poppins, Arial, sans-serif" font-size="108" font-weight="800" letter-spacing="-4">GetYourTours</text>
    <text x="1115" y="238" font-family="Inter, Montserrat, Poppins, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-1.5">Mauritius</text>
  </g>
</svg>
