# Scheduled background work: drains the notification outbox (sends queued booking-confirmation
# emails) and runs booking maintenance (sweeps stale holds, expires abandoned bookings).
#
# DISABLED until you opt in — set repository variable ENABLE_SCHEDULED_TASKS = "true". It also needs:
#   - repository VARIABLE  SITE_URL              = https://your-deployed-site  (no trailing slash)
#   - repository SECRET    INTERNAL_TASK_SECRET  = the same value as the app's INTERNAL_TASK_SECRET env
#
# GitHub cron granularity is ~5 minutes and best-effort; that latency is fine for these jobs. For
# tighter timing, use a Cloudflare Worker cron trigger hitting the same endpoints instead.
name: Scheduled tasks

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    if: ${{ vars.ENABLE_SCHEDULED_TASKS == 'true' }}
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ vars.SITE_URL }}
      SECRET: ${{ secrets.INTERNAL_TASK_SECRET }}
    steps:
      - name: Drain notifications
        run: |
          curl -fsS -X POST "$SITE_URL/api/v1/internal/notifications/drain" -H "x-internal-secret: $SECRET"

      - name: Booking maintenance
        run: |
          curl -fsS -X POST "$SITE_URL/api/v1/internal/maintenance" -H "x-internal-secret: $SECRET"
