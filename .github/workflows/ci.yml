# Continuous integration — runs the full green gate on every push to main and every PR, plus the
# Cloudflare edge bundle (`pages:build`) which is broken on the Windows dev machine and so was never
# verified anywhere until now. Make this a required status check on main in the repo settings.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Formatting is enforced so it can't drift silently (was red + unenforced). The generated
      # artifacts (setup.sql, openapi.json) are prettier-ignored and instead guarded for freshness by
      # the parity tests in the Test step.
      - name: Format check
        run: npm run format:check

      # Runs the full suite WITH coverage so the thresholds in vitest.config.ts are enforced (was
      # unenforced; the provider was even missing). A coverage regression now fails the build.
      - name: Test (with coverage thresholds)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      # The actual deployable artifact. If this fails, the edge bundle is broken even though
      # `next build` passed — exactly the gap this CI closes.
      - name: Edge bundle (Cloudflare Pages)
        run: npm run pages:build

  # Homepage smoke in a real browser — a SEPARATE job so a browser flake can't block the unit gate. The
  # app degrades gracefully without Supabase/Peach (the catalogue fetch is try/caught to []), so this
  # needs no secrets; playwright.config.ts's webServer builds + serves the app. Catches edge-runtime boot
  # failures / hydration breakage / 500s that `next build` alone never exercises.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run test:e2e
