# ⚠️ MANUAL, ONE-TIME(ish) PRODUCTION DATABASE WORKFLOW — NOT PART OF NORMAL RELEASES ⚠️
#
# Production's Supabase migration history table (supabase_migrations.schema_migrations) has been
# EMPTY even though the live schema is fully up to date — the schema was always applied by hand-
# pasting supabase/catch-up.sql (see docs/handbook/database.md), never via `supabase db push`. This
# workflow performs the ONE-TIME reconciliation that lets the normal release pipeline (release.yml)
# safely run `supabase db push` on every future release instead of relying on a human to keep
# catch-up.sql pasted in by hand forever.
#
# This workflow NEVER runs automatically (workflow_dispatch only — no push/pull_request trigger).
# It changes PRODUCTION migration HISTORY. Do not run it casually, and do not run it at all unless:
#   1. You have a verified, recent Supabase backup/PITR point (Dashboard → Database → Backups).
#   2. You understand catch-up.sql runs mostly in AUTOCOMMIT (see docs/handbook/database.md —
#      "catch-up.sql is only half transactional") — a failure partway through leaves a partial state.
#   3. You are not doing this during the OpenNext migration or any other in-flight platform change.
#
# After this completes successfully, set the repository variable
# SUPABASE_MIGRATION_LEDGER_RECONCILED=true — release.yml refuses to touch the database until you do.
name: Reconcile Supabase Migration Ledger

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type exactly: BACKUP_TAKEN_AND_RECONCILE (confirms you have a verified backup/PITR point and understand this changes production migration history)'
        required: true
        type: string
      ci_run_id:
        description: 'Run ID of a successful CI run on a push to main — supabase/catch-up.sql and supabase/migrations are taken from that EXACT commit'
        required: true
        type: string

permissions:
  contents: read

# Shares release.yml's concurrency group DELIBERATELY: a production release and a ledger
# reconciliation must never run at the same time (both touch the database). Whichever started first
# runs to completion; the other waits.
concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
    steps:
      - name: Assert the typed backup confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "BACKUP_TAKEN_AND_RECONCILE" ]; then
            echo "::error::Confirmation phrase did not match exactly. Refusing to touch production."
            exit 1
          fi
          echo "✓ typed confirmation matched"

      - name: Resolve + validate the CI run (exact main SHA, successful CI)
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CI_RUN_ID: ${{ github.event.inputs.ci_run_id }}
        run: |
          set -euo pipefail
          RUN_JSON=$(gh api "repos/$REPO/actions/runs/$CI_RUN_ID")
          WORKFLOW_NAME=$(echo "$RUN_JSON" | jq -r '.name')
          CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion')
          TRIGGER_EVENT=$(echo "$RUN_JSON" | jq -r '.event')
          HEAD_BRANCH=$(echo "$RUN_JSON" | jq -r '.head_branch')
          HEAD_REPO=$(echo "$RUN_JSON" | jq -r '.head_repository.full_name')
          SHA=$(echo "$RUN_JSON" | jq -r '.head_sha')

          [ "$WORKFLOW_NAME" = "CI" ] || { echo "::error::run $CI_RUN_ID is not a CI run (name=$WORKFLOW_NAME)"; exit 1; }
          [ "$CONCLUSION" = "success" ] || { echo "::error::CI run $CI_RUN_ID did not succeed (conclusion=$CONCLUSION)"; exit 1; }
          [ "$TRIGGER_EVENT" = "push" ] || { echo "::error::CI run was not a push (event=$TRIGGER_EVENT)"; exit 1; }
          [ "$HEAD_BRANCH" = "main" ] || { echo "::error::CI run's branch is not main (branch=$HEAD_BRANCH)"; exit 1; }
          [ "$HEAD_REPO" = "$REPO" ] || { echo "::error::CI run's repository is not this repository"; exit 1; }
          [[ "$SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::resolved SHA is malformed: $SHA"; exit 1; }

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "✓ CI run $CI_RUN_ID: successful push to main at $SHA"

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ steps.resolve.outputs.sha }}
          fetch-depth: 0

      - name: Verify the exact SHA is reachable from origin/main
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          git merge-base --is-ancestor "${{ steps.resolve.outputs.sha }}" origin/main
          echo "✓ ${{ steps.resolve.outputs.sha }} is an ancestor of origin/main"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Step 2: the current, idempotent catch-up.sql. This is the SAME script the owner has been
      # pasting into the Supabase SQL editor by hand — running it here changes nothing about what
      # gets applied, only how. Runs mostly in autocommit (see docs/handbook/database.md); a failure
      # partway through is a PARTIAL STATE, not a rollback. If this step fails, STOP — do not
      # proceed to step 3 — fix the error and re-run this whole workflow from the top (idempotent).
      - name: 'Step 2: run supabase/catch-up.sql'
        env:
          SUPABASE_DB_URL: postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.${{ vars.SUPABASE_PROJECT_ID }}.supabase.co:5432/postgres
        run: npx tsx scripts/db-exec.ts supabase/catch-up.sql

      # Step 3: ONLY reached if step 2 succeeded. Backfills the ledger to record every migration in
      # supabase/migrations as already-applied (idempotent — `on conflict (version) do nothing`).
      - name: 'Step 3: run supabase/backfill-migration-ledger.sql'
        env:
          SUPABASE_DB_URL: postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.${{ vars.SUPABASE_PROJECT_ID }}.supabase.co:5432/postgres
        run: npx tsx scripts/db-exec.ts supabase/backfill-migration-ledger.sql

      # Step 4: the ledger must now match supabase/migrations 1:1 — no gaps, no unexpected
      # remote-only versions, no non-linear history.
      - name: 'Step 4: verify ledger versions/names match supabase/migrations 1:1'
        env:
          SUPABASE_DB_URL: postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.${{ vars.SUPABASE_PROJECT_ID }}.supabase.co:5432/postgres
        run: node scripts/release/supabase-ledger.mjs --mode status

      # Steps 5-6: `supabase db push --dry-run` must independently agree there is nothing pending —
      # a second, CLI-native confirmation on top of step 4's direct SQL comparison.
      - name: 'Step 5-6: supabase db push --dry-run reports nothing pending'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: node scripts/release/supabase-ledger.mjs --mode dry-run

      # Step 7: sanitized audit summary — counts and the SHA only, never connection strings or
      # secret values.
      - name: 'Step 7: sanitized audit summary'
        env:
          SUPABASE_DB_URL: postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@db.${{ vars.SUPABASE_PROJECT_ID }}.supabase.co:5432/postgres
        run: |
          {
            echo "## ✅ Supabase migration ledger reconciled"
            echo "- Reconciled from commit: \`${{ steps.resolve.outputs.sha }}\`"
            echo "- catch-up.sql: applied (idempotent)"
            echo "- backfill-migration-ledger.sql: applied (idempotent)"
            echo "- Ledger parity: 1:1 with supabase/migrations (verified)"
            echo "- db push --dry-run: nothing pending (verified)"
            echo ""
            echo "### Step 8 — REQUIRED before release.yml will touch the database"
            echo "Set the repository variable \`SUPABASE_MIGRATION_LEDGER_RECONCILED\` to exactly \`true\`:"
            echo "Settings → Secrets and variables → Actions → Variables."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "✓ reconciliation complete — set SUPABASE_MIGRATION_LEDGER_RECONCILED=true to unblock releases"
